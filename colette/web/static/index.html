<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Colette — Coffee Roulette</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/style.css" />
    <script>
      // Apply the saved theme before first paint to avoid a flash. No saved
      // value means "follow the OS" (handled by color-scheme in the CSS).
      try {
        var t = localStorage.getItem("colette-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.dataset.theme = t;
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <a class="logo-link" href="#/" aria-label="Colette — go to overview">
          <svg
            class="logo"
            viewBox="0 0 32 32"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <rect width="32" height="32" rx="7" fill="#8a4a28" />
            <g
              fill="none"
              stroke="#fff"
              stroke-width="2"
              stroke-linecap="round"
            >
              <path class="steam" d="M12 4.5q1.6 1.5 0 3 1.6 1.5 0 3" />
              <path class="steam steam-2" d="M17 4.5q1.6 1.5 0 3 1.6 1.5 0 3" />
            </g>
            <path
              d="M7 13.5h13v3.5a6.5 6.5 0 0 1-6.5 6.5A6.5 6.5 0 0 1 7 17z"
              fill="#fff"
            />
            <path
              d="M20 14.8h2.6a3.1 3.1 0 0 1 0 6.2H20"
              fill="none"
              stroke="#fff"
              stroke-width="2.2"
            />
          </svg>
        </a>
        <h1 class="brand-name">Colette</h1>
        <span class="brand-tag">coffee roulette</span>
      </div>
      <div class="topbar-right">
        <div class="path" id="path-display" title="working directory"></div>
        <button
          class="theme-toggle"
          id="theme-toggle"
          type="button"
          aria-label="Toggle colour theme"
        >
        </button>
      </div>
    </header>

    <nav class="tabs" id="tabs" aria-label="Sections">
      <button class="tab" data-view="overview">Overview</button>
      <button class="tab" data-view="people">People</button>
      <button class="tab" data-view="rounds">Rounds</button>
      <button class="tab" data-view="email">Email</button>
      <button class="tab" data-view="history">History</button>
    </nav>

    <main id="main" class="main"></main>

    <div id="status" class="status" role="status" aria-live="polite"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
